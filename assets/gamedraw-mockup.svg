<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="1000" height="700">
  <defs>
    <style>
      .bg      { fill: #181825; }
      .card    { fill: #1E1E2E; }
      .input   { fill: #313244; }
      .border  { stroke: #45475A; }
      .accent  { fill: #89B4FA; }
      .success { fill: #A6E3A1; }
      .warn    { fill: #F9E2AF; }
      .muted   { fill: #BAC2DE; font-family: 'Segoe UI', Arial, sans-serif; }
      .txt     { fill: #FFFFFF; font-family: 'Segoe UI', Arial, sans-serif; }
      .btn     { fill: #89B4FA; }
      .btnTxt  { fill: #11111B; font-family: 'Segoe UI', Arial, sans-serif; font-weight: 700; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1000" height="700"/>

  <!-- Barre de titre (illustrative) -->
  <rect x="0" y="0" width="1000" height="30" fill="#0D0D14"/>
  <text x="16" y="20" class="muted" font-size="12">GameDraw v23 - Theme : Catppuccin</text>

  <!-- En-tete -->
  <rect class="accent" x="24" y="50" width="34" height="34" rx="8"/>
  <text x="70" y="76" class="txt" font-size="26" font-weight="800">GameDraw</text>

  <rect class="card" x="600" y="48" width="40" height="40" rx="10"/>
  <rect class="card" x="650" y="48" width="40" height="40" rx="10"/>
  <rect class="card" x="700" y="48" width="130" height="40" rx="10"/>
  <text x="720" y="73" class="txt" font-size="13">Statistiques</text>
  <rect class="card" x="840" y="48" width="150" height="40" rx="10"/>
  <text x="862" y="73" class="txt" font-size="13">Gerer les jeux</text>

  <!-- Selecteur plateforme + parametres -->
  <rect class="card" x="24" y="112" width="952" height="80" rx="14"/>
  <text x="44" y="140" class="muted" font-size="12" font-weight="700">PLATEFORME</text>
  <rect class="input" x="44" y="150" width="160" height="30" rx="8"/>
  <text x="58" y="170" class="txt" font-size="13">Switch</text>

  <text x="240" y="140" class="muted" font-size="12" font-weight="700">OBJECTIF</text>
  <rect class="input" x="240" y="150" width="220" height="30" rx="8"/>
  <text x="254" y="170" class="txt" font-size="13">Terminer l'histoire</text>

  <text x="500" y="140" class="muted" font-size="12" font-weight="700">DUREE</text>
  <rect class="input" x="500" y="150" width="90" height="30" rx="8"/>
  <rect class="input" x="598" y="150" width="120" height="30" rx="8"/>

  <!-- Resultat + historique -->
  <rect class="card" x="24" y="208" width="460" height="460" rx="16"/>
  <text x="254" y="250" class="muted" font-size="12" font-weight="700" text-anchor="middle">RESULTAT DU TIRAGE</text>
  <text x="254" y="300" class="success" font-size="30" font-weight="800" text-anchor="middle">Zelda: Tears of the Kingdom</text>
  <text x="254" y="330" class="warn" font-size="14" font-weight="700" text-anchor="middle">Objectif : Terminer l'histoire</text>
  <text x="254" y="352" class="txt" font-size="13" text-anchor="middle">Aucune limite de temps</text>

  <text x="254" y="400" class="muted" font-size="11" text-anchor="middle">4 jeu(x) restant(s) sur 12 avant reset automatique</text>
  <rect class="input" x="74" y="410" width="360" height="8" rx="4"/>
  <rect class="accent" x="74" y="410" width="240" height="8" rx="4"/>

  <rect class="btn" x="74" y="460" width="360" height="50" rx="12"/>
  <text x="254" y="490" class="btnTxt" font-size="16" text-anchor="middle">LANCER LE TIRAGE</text>

  <rect class="input" x="74" y="524" width="360" height="40" rx="10"/>
  <text x="254" y="548" class="txt" font-size="13" text-anchor="middle">Marquer comme termine</text>

  <rect class="card" x="500" y="208" width="476" height="460" rx="16"/>
  <text x="524" y="240" class="muted" font-size="12" font-weight="700">HISTORIQUE DES TIRAGES</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="13">
    <text x="524" y="272" class="txt">[Switch] Mario Kart 8 Deluxe | 1 Jours | objectif: 100%</text>
    <text x="524" y="300" class="txt">[PC] Hades | sans limite | objectif: Terminer l'histoire</text>
    <text x="524" y="328" class="txt">[Switch] Kirby et le Monde Oublie | 2 Heures | objectif: Libre</text>
    <text x="524" y="356" class="txt">[PC] Stardew Valley | sans limite | objectif: Libre</text>
  </g>

  <text x="500" y="690" class="muted" font-size="12" text-anchor="middle" font-style="italic">
    Apercu illustratif de l'interface (maquette) - pas une capture d'ecran reelle
  </text>
</svg>
