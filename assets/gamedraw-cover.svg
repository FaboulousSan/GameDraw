<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360">
  <defs>
    <style>
      .bg     { fill: #11111B; }
      .card   { fill: #1E1E2E; }
      .accent { fill: #89B4FA; }
      .success{ fill: #A6E3A1; }
      .warn   { fill: #F9E2AF; }
      .danger { fill: #F38BA8; }
      .text   { fill: #FFFFFF; font-family: 'Segoe UI', Arial, sans-serif; font-weight: 800; }
      .sub    { fill: #BAC2DE; font-family: 'Segoe UI', Arial, sans-serif; font-weight: 600; }
      .tag    { fill: #BAC2DE; font-family: 'Segoe UI', Arial, sans-serif; font-weight: 600; font-size: 15px; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="360"/>

  <!-- Motif discret de des en arriere-plan -->
  <g opacity="0.06">
    <rect class="accent" x="1000" y="40" width="60" height="60" rx="12" transform="rotate(12 1030 70)"/>
    <rect class="success" x="1090" y="120" width="46" height="46" rx="10" transform="rotate(-8 1113 143)"/>
    <rect class="warn" x="980" y="220" width="70" height="70" rx="14" transform="rotate(18 1015 255)"/>
    <rect class="accent" x="1120" y="230" width="40" height="40" rx="9" transform="rotate(-15 1140 250)"/>
  </g>

  <!-- Badge / de principal -->
  <g transform="translate(60,110)">
    <rect class="card" x="0" y="0" width="140" height="140" rx="24"/>
    <circle class="accent" cx="38"  cy="38"  r="11"/>
    <circle class="accent" cx="102" cy="38"  r="11"/>
    <circle class="warn"   cx="70"  cy="70"  r="13"/>
    <circle class="accent" cx="38"  cy="102" r="11"/>
    <circle class="accent" cx="102" cy="102" r="11"/>
  </g>

  <!-- Wordmark -->
  <text x="230" y="175" class="text" font-size="64">GameDraw</text>
  <text x="233" y="208" class="sub" font-size="20">Tirage au sort de jeux video - Switch, PC et plus</text>

  <!-- Badges de fonctionnalites -->
  <g transform="translate(233,240)">
    <rect class="card" x="0" y="0" width="150" height="34" rx="17"/>
    <text x="18" y="23" class="tag">8 themes</text>

    <rect class="card" x="164" y="0" width="190" height="34" rx="17"/>
    <text x="182" y="23" class="tag">Notation en un clic</text>

    <rect class="card" x="368" y="0" width="210" height="34" rx="17"/>
    <text x="386" y="23" class="tag">Statistiques &amp; historique</text>

    <rect class="card" x="592" y="0" width="180" height="34" rx="17"/>
    <text x="610" y="23" class="tag">Sauvegarde en 1 clic</text>
  </g>
</svg>
